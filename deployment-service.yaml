apiVersion: apps/v1
kind: Deployment
metadata:
  name: boardgame-deployment
  namespace: webapps
spec:
  selector:
    matchLabels:
      app: boardgame
  replicas: 2
  template:
    metadata:
      labels:
        app: boardgame
    spec:
      containers:
      - name: boardgame
        image: senthilkumarsoundararajan/boardgame:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: boardgame-service
  namespace: webapps
spec:
  selector:
    app: boardgame
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30007
  type: NodePort
